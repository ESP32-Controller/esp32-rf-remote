<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 RF 遥控器</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 420px;
  padding-top: 90px;
  text-align: center;
}

h2 {
  font-size: 22px;
  margin-bottom: 30px;
}

#connect {
  width: 260px;
  height: 70px;
  font-size: 28px;
  margin-bottom: 45px;
  border-radius: 16px;
  border: none;
  background: #13c2c2;
  color: white;
}

.key-grid {
  display: grid;
  grid-template-columns: 130px 130px;
  gap: 22px 28px;
  justify-content: center;
}

.key-grid button {
  width: 130px;
  height: 75px;
  font-size: 30px;
  border-radius: 14px;
  border: none;
  background: #1677ff;
  color: white;
}

button:active {
  transform: scale(0.96);
}

#status {
  margin-top: 35px;
  font-size: 22px;
}

</style>
</head>

<body>

<div class="container">

  <h2>ESP32 RF 遥控器</h2>

  <button id="connect">连接 ESP32</button>

  <div class="key-grid">
    <button onclick="sendCmd('A')">A</button>
    <button onclick="sendCmd('B')">B</button>
    <button onclick="sendCmd('C')">C</button>
    <button onclick="sendCmd('D')">D</button>
  </div>

  <p id="status">未连接</p>

</div>

</body>
</html>
