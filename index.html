<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">

<title>ESP32 RF 遥控器</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 390px;
  padding: 80px 24px 20px;
  text-align: center;
}

h2 {
  font-size: 26px;
  margin: 0 0 32px;
}

button {
  border: none;
  color: white;
  border-radius: 18px;
  font-weight: 500;
}

#connect {
  width: 100%;
  height: 68px;
  font-size: 28px;
  background: #18c3c8;
  margin-bottom: 42px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.grid button {
  width: 100%;
  height: 82px;
  font-size: 42px;
  background: #1e73ff;
}

button:active {
  transform: scale(0.96);
}

#status {
  margin-top: 36px;
  font-size: 22px;
}
</style>
</head>

<body>
<div class="container">
  <h2>ESP32 RF 遥控器</h2>

  <button id="connect">连接 ESP32</button>

  <div class="grid">
    <button ontouchstart="sendCmd('A'); return false;">A</button>
    <button ontouchstart="sendCmd('B'); return false;">B</button>
    <button ontouchstart="sendCmd('C'); return false;">C</button>
    <button ontouchstart="sendCmd('D'); return false;">D</button>
  </div>

  <p id="status">未连接</p>
</div>

<script>
let characteristic = null;
let isSending = false;
let lastSendTime = 0;

const MIN_SEND_INTERVAL = 50;

const serviceUUID = "12345678-1234-1234-1234-1234567890ab";
const characteristicUUID = "abcd1234-5678-90ab-cdef-1234567890ab";

document.getElementById("connect").onclick = async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "ESP32_RF" }],
      optionalServices: [serviceUUID]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(serviceUUID);
    characteristic = await service.getCharacteristic(characteristicUUID);

    document.getElementById("status").innerText = "已连接 ESP32_RF";
  } catch (error) {
    document.getElementById("status").innerText = "连接失败";
    console.log(error);
  }
};

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function sendCmd(cmd) {
  if (!characteristic) {
    alert("请先连接 ESP32");
    return;
  }

  if (isSending) {
    return;
  }

  const now = Date.now();
  const elapsed = now - lastSendTime;

  if (elapsed < MIN_SEND_INTERVAL) {
    return;
  }

  isSending = true;
  lastSendTime = now;

  try {
    const data = new TextEncoder().encode(cmd);

    await characteristic.writeValueWithoutResponse(data);

    document.getElementById("status").innerText = "已发送：" + cmd;

    await sleep(MIN_SEND_INTERVAL);
  } catch (error) {
    console.log(error);
    document.getElementById("status").innerText = "发送失败，请重新连接";
    characteristic = null;
  }

  isSending = false;
}
</script>
</body>
</html>
