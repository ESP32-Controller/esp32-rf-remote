<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">

<title>ESP32 RF 遥控器</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 390px;
  padding: 90px 24px 20px;
  text-align: center;
}

h2 {
  font-size: 26px;
  margin: 0 0 32px;
}

button {
  border: none;
  color: white;
  border-radius: 18px;
  font-weight: 500;
}

#connect {
  width: 100%;
  height: 68px;
  font-size: 28px;
  background: #18c3c8;
  margin-bottom: 42px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.grid button {
  width: 100%;
  height: 82px;
  font-size: 42px;
  background: #1e73ff;
}

button:active {
  transform: scale(0.96);
}

#status {
  margin-top: 36px;
  font-size: 22px;
}
</style>
</head>

<body>
<div class="container">
  <h2>ESP32 RF 遥控器</h2>

  <button id="connect">连接 ESP32</button>

  <div class="grid">
    <button onclick="sendCmd('A')">A</button>
    <button onclick="sendCmd('B')">B</button>
    <button onclick="sendCmd('C')">C</button>
    <button onclick="sendCmd('D')">D</button>
  </div>

  <p id="status">未连接</p>
</div>

<script>
let characteristic;
let lastTouchEnd = 0;

document.addEventListener("gesturestart", function (e) {
  e.preventDefault();
});

document.addEventListener("touchend", function (e) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

const serviceUUID = "12345678-1234-1234-1234-1234567890ab";
const characteristicUUID = "abcd1234-5678-90ab-cdef-1234567890ab";

document.getElementById("connect").onclick = async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "ESP32_RF" }],
      optionalServices: [serviceUUID]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(serviceUUID);
    characteristic = await service.getCharacteristic(characteristicUUID);

    document.getElementById("status").innerText = "已连接 ESP32_RF";
  } catch (error) {
    document.getElementById("status").innerText = "连接失败";
    console.log(error);
  }
};

async function sendCmd(cmd) {
  if (!characteristic) {
    alert("请先连接 ESP32");
    return;
  }

  const data = new TextEncoder().encode(cmd);
  await characteristic.writeValueWithoutResponse(data);

  document.getElementById("status").innerText = "已发送：" + cmd;
}
</script>
</body>
</html>
