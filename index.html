<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="theme-color" content="#1677ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RF遥控器">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">

<title>ESP32 RF 遥控器</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 430px;
  text-align: center;
  padding-top: 80px;
}

h2 {
  font-size: 28px;
  margin-bottom: 35px;
}

button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#connect {
  width: 280px;
  height: 75px;
  font-size: 30px;
  border: none;
  border-radius: 18px;
  background: #18c3c8;
  color: white;
  margin-bottom: 50px;
}

.grid {
  display: grid;
  grid-template-columns: 140px 140px;
  justify-content: center;
  gap: 28px;
}

.grid button {
  width: 140px;
  height: 85px;
  font-size: 38px;
  border: none;
  border-radius: 18px;
  background: #1e73ff;
  color: white;
}

button:active {
  transform: scale(0.96);
}

#status {
  margin-top: 40px;
  font-size: 24px;
}
</style>
</head>

<body>
<div class="container">

  <h2>ESP32 RF 遥控器</h2>

  <button id="connect">连接 ESP32</button>

  <div class="grid">
    <button onclick="sendCmd('A')">A</button>
    <button onclick="sendCmd('B')">B</button>
    <button onclick="sendCmd('C')">C</button>
    <button onclick="sendCmd('D')">D</button>
  </div>

  <p id="status">未连接</p>

</div>

<script>
let characteristic;
let device;

const serviceUUID = "12345678-1234-1234-1234-1234567890ab";
const characteristicUUID = "abcd1234-5678-90ab-cdef-1234567890ab";

document.getElementById("connect").onclick = async () => {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "ESP32_RF" }],
      optionalServices: [serviceUUID]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(serviceUUID);
    characteristic = await service.getCharacteristic(characteristicUUID);

    document.getElementById("status").innerText = "已连接 ESP32_RF";
  } catch (error) {
    document.getElementById("status").innerText = "连接失败";
    console.log(error);
  }
};

async function sendCmd(cmd) {
  if (!characteristic) {
    alert("请先连接 ESP32");
    return;
  }

  const data = new TextEncoder().encode(cmd);

  await characteristic.writeValueWithoutResponse(data);

  document.getElementById("status").innerText = "已发送：" + cmd;
}
</script>

</body>
</html>
