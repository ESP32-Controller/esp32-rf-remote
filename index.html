<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 RF 遥控器</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f4f4f4;
  padding-top:40px;
}

button{
  width:140px;
  height:80px;
  font-size:32px;
  margin:15px;
  border-radius:16px;
  border:none;
  background:#1677ff;
  color:white;
}

#connect{
  width:300px;
  background:#13c2c2;
}

#status{
  margin-top:20px;
  font-size:24px;
}

</style>
</head>

<body>

<h2>ESP32 RF 遥控器</h2>

<button id="connect">
连接 ESP32
</button>

<br><br>

<button onclick="sendCmd('A')">A</button>
<button onclick="sendCmd('B')">B</button>

<br>

<button onclick="sendCmd('C')">C</button>
<button onclick="sendCmd('D')">D</button>

<p id="status">未连接</p>

<script>

let characteristic;

const serviceUUID =
"12345678-1234-1234-1234-1234567890ab";

const characteristicUUID =
"abcd1234-5678-90ab-cdef-1234567890ab";

document
.getElementById("connect")
.onclick = async () => {

  try {

    const device =
    await navigator.bluetooth.requestDevice({

      filters:[
        {name:"ESP32_RF"}
      ],

      optionalServices:[
        serviceUUID
      ]
    });

    const server =
    await device.gatt.connect();

    const service =
    await server.getPrimaryService(
      serviceUUID
    );

    characteristic =
    await service.getCharacteristic(
      characteristicUUID
    );

    document.getElementById(
      "status"
    ).innerText =
    "已连接 ESP32_RF";

  } catch(error){

    document.getElementById(
      "status"
    ).innerText =
    "连接失败";

    console.log(error);
  }
};

async function sendCmd(cmd){

  if(!characteristic){

    alert("请先连接 ESP32");
    return;
  }

  const data =
  new TextEncoder().encode(cmd);

  await characteristic
  .writeValueWithoutResponse(data);

  document.getElementById(
    "status"
  ).innerText =
  "已发送："+cmd;
}

</script>

</body>
</html>
